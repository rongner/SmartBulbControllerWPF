name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SmartBulbControllerWPF.slnx

      - name: Build
        run: dotnet build SmartBulbControllerWPF.slnx --no-restore --configuration Release

  test:
    name: Test
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SmartBulbControllerWPF.slnx

      - name: Test
        run: dotnet test SmartBulbControllerWPF.slnx --no-restore --configuration Release --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'
          retention-days: 7

  publish:
    name: Publish
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish
        run: >
          dotnet publish src/SmartBulbControllerWPF/SmartBulbControllerWPF.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output publish/

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-output
          path: publish/
          retention-days: 30

  installer:
    name: Installer
    runs-on: windows-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: publish-output
          path: publish/

      - name: Build installer
        run: >
          iscc /DAppVersion=${{ steps.version.outputs.VERSION }}
          /DOutputDir=${{ github.workspace }}\installer\output
          installer\setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/output/*.exe
          retention-days: 30

  release:
    name: Release
    runs-on: windows-latest
    needs: installer
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: installer/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/*.exe
          generate_release_notes: true
